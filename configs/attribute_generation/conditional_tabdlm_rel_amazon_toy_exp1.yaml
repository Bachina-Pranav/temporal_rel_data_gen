paths:
  train_data_path: data/original/rel-amazon-toy/review.csv
  synthetic_spine_path: outputs/amazon-toy/time_biased_block_stub_matching_exact_pairing/synthetic_review.csv
  output_dir: outputs/amazon-toy/conditional_tabdlm_exp1_summary_only

columns:
  condition:
    foreign_keys:
      - customer_id
      - product_id
    datetimes:
      - review_time
  target:
    categorical:
      - rating
      - verified
    numerical: []
    text:
      - summary

text:
  max_length:
    summary: 32

tokenizer:
  max_vocab_size: 30000
  min_frequency: 1
  lowercase: true

id_encoding:
  type: hash_embedding
  num_buckets: 262144
  embedding_dim: 128

datetime_encoding:
  type: continuous_time_fourier
  embedding_dim: 64

model:
  type: small_mlm_transformer
  hidden_dim: 384
  num_layers: 6
  num_heads: 6
  dropout: 0.1
  condition_dim: 256

diffusion:
  type: masked_language_diffusion
  timesteps: 50
  mask_schedule: linear
  min_mask_prob: 0.05
  max_mask_prob: 0.95

training:
  max_rows: 50000
  batch_size: 128
  epochs: 5
  learning_rate: 0.0003
  weight_decay: 0.01
  seed: 42
  num_workers: 4
  mixed_precision: true
  device: auto

sampling:
  num_rows: 50000
  batch_size: 128
  temperature: 1.0
  top_p: 0.95
  seed: 42
  device: auto
