experiment_name: lstm_retailrocket_100k
dataset_name: retailrocket_100k

paths:
  train_data_path: data/processed/interaction_benchmarks/retailrocket_100k/interactions.csv
  synthetic_spine_path: data/processed/interaction_benchmarks/retailrocket_100k/interactions.csv
  output_dir: outputs/retailrocket_100k/lstm

columns:
  condition:
    foreign_keys: [visitor_id, item_id]
    datetimes: [event_time]
  target:
    categorical: [event_type]
    numerical: []
    text: []

schema:
  fields:
    visitor_id: {role: source_foreign_key, semantic_type: foreign_key}
    item_id: {role: destination_foreign_key, semantic_type: foreign_key}
    event_time: {role: timestamp, semantic_type: datetime}
    event_type: {role: generated_attribute, semantic_type: categorical, nullable: false, valid_domain: [view, addtocart, transaction]}

graph_conditioning:
  enabled: true
  mode: structure_only_temporal
  node_types: [visitor, item, event]
  event_node_type: event
  foreign_key_edges:
    - {source_node_type: visitor, source_column: visitor_id, target_node_type: event, edge_type: visitor_to_event}
    - {source_node_type: item, source_column: item_id, target_node_type: event, edge_type: item_to_event}
  temporal_filter:
    enabled: true
    mode: past_only
    timestamp_column: event_time
    allow_same_timestamp_events: false
    exclude_target_event_from_neighbors: true
    max_history_events_per_customer: 50
    max_history_events_per_product: 100
    history_sampling_strategy: recent
  forbidden_node_features: [rating, verified, summary, review_text, event_type]
  graph_uses_future_events: false
  graph_uses_target_attributes: false
  graph_encoder: {type: temporal_structure_ego_encoder, hidden_dim: 128, output_dim: 128, num_layers: 1, dropout: 0.1}

text:
  max_length: {}

tokenizer: {max_vocab_size: 1000, min_frequency: 1, lowercase: true}
id_encoding: {type: hash_embedding, num_buckets: 262144, embedding_dim: 64}
datetime_encoding: {type: continuous_time_fourier, embedding_dim: 32}
model:
  family: joint_lstm_generator
  row_hidden_dim: 128
  latent_noise_dim: 32
  categorical_context_dim: 16
  dropout: 0.1
  use_graph_context: true
  graph_context_dim: 128
text_decoder: {type: lstm, embedding_dim: 64, hidden_dim: 128, num_layers: 1, dropout: 0.0}
training: {batch_size: 64, epochs: 5, lr: 0.0005, weight_decay: 0.01, seed: 42, num_workers: 0, mixed_precision: true, device: auto}
loss_weights: {event_type: 1.0}
sampling: {num_rows: 1000, batch_size: auto, temperature: 0.9, top_p: 0.95, seed: 42, device: auto}
