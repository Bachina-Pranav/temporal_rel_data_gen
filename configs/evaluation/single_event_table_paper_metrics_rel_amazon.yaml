dataset_name: rel_amazon
paper_metrics_version: single_event_table_v1.1
evaluation_level: single_event_table

real_table_path: data/original/rel-amazon/review.csv
synthetic_table_path: outputs/rel-amazon/conditional_tabdlm_exp5_3_lstm_length_preserving_privacy_sampler/runs/v51_length_preserving_exact_block/synthetic_review_attrs_full.csv

row_count:
  require_match_for_final: true
  on_mismatch: warn

categorical_canonicalization:
  enabled: true

datetime:
  normalize_for_distance: true
  report_human_readable_wasserstein: true

shape:
  headline_excludes_primary_keys: true
  headline_excludes_foreign_keys: true

trend:
  exclude_primary_keys_from_headline: true
  exclude_foreign_keys_from_headline: true
  exclude_high_cardinality_ids_from_headline: true
  high_cardinality_threshold: 100

c2st:
  balanced_sampling: true
  save_feature_names: true
  save_feature_importance: true
  max_rows_for_c2st: 100000

legacy_evaluator:
  enabled: true
  config_path: configs/attribute_generation/conditional_tabdlm_rel_amazon_exp5_3_lstm_length_preserving.yaml

table:
  name: review
  primary_key: null
  columns:
    customer_id:
      type: foreign_key
      references:
        table: customer
        column: customer_id
      parent_table_path: data/original/rel-amazon/customer.csv
      nullable: false
    product_id:
      type: foreign_key
      references:
        table: product
        column: product_id
      parent_table_path: data/original/rel-amazon/product.csv
      nullable: false
    review_time:
      type: datetime
      nullable: false
    rating:
      type: categorical
      dtype: int
      valid_values: [1, 2, 3, 4, 5]
      nullable: false
    verified:
      type: categorical
      dtype: int
      valid_values: [0, 1]
      nullable: false
    summary:
      type: text
      nullable: false
    review_text:
      type: text
      nullable: false

evaluation:
  random_seed: 42
  sample_size: null
  max_rows_for_c2st: 100000
  temporal:
    timestamp_columns:
      - review_time
    binning:
      modes:
        - adaptive
        - daily
        - weekly
        - monthly
      adaptive_target_bins: 50
    entity_inter_event:
      enabled: true
      entity_columns:
        - customer_id
        - product_id
  text:
    embedding_model: sentence-transformers/all-MiniLM-L6-v2
    cache_embeddings: true
    max_text_rows: 100000
    text_columns:
      - summary
      - review_text
  c2st:
    enabled: true
    balanced_sampling: true
    save_feature_names: true
    save_feature_importance: true
    max_rows_for_c2st: 100000
    classifiers:
      - logistic_regression
      - random_forest
      - gradient_boosting
    n_splits: 5
    metric: auc
